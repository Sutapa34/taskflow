services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
      - redis
    networks:
      - taskflow

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - taskflow

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: taskflow
      MYSQL_USER: taskflow
      MYSQL_PASSWORD: taskflow
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - taskflow

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - taskflow

  adminer:
    image: adminer
    ports:
      - "8081:8080"
    depends_on:
      - mysql
    networks:
      - taskflow

networks:
  taskflow:

volumes:
  mysql_data: